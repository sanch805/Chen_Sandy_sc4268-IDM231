<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

<head>
    <title>Wii Wii</title>
    <link rel="icon" type="image/png" href="media/cherry_blossom.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/digital-7.ttf">
</head>

<style>
    body {
    margin: 0;
    background: url("media/Wii-Background.png");
    cursor: url("css/Wii Cursor.cur"), default;
}
</style>

<body>
    <form>
        <label for="birthday">Birthday: </label>
        <input
        type="date"
        name="birthday"
        required
     />
     <br>
    <button type="submit">Find my Channel!</button>

    <main>
    </main>

    <div class="clock-container">
        <div class="time" id="time"></div>
    </div>

    <script src="test.js"></script>

    <script>
        function updateTime() {
            const now = new Date();

            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            const timeString = `${hours}:${minutes} ${ampm}`;
            
            document.getElementById('time').textContent = timeString;
        }
        
        updateTime();
        setInterval(updateTime, 60000);
    </script>

    <footer>
        <div class="button-cont">
            <a class="button">Home</a>
        </div>

        <div id="light" class="help">
            Need help? Put in your birthday and click 'Find my Channel' to find out what you're channeling!
            Or play around and click any of the channels by thumbnail!
            <br>
            <a class="help-close" id="close-btn" href="#">Close</a>
        </div>


        <div class="button-cont right-side">
            <a class="button" id="ask-btn" href="#">Ask</a>
        </div>
    </footer>

    </body>
</html>
