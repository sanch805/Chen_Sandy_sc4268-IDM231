<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

<head>
    <title>Wii Wii</title>
    <link rel="icon" type="image/png" href="media/cherry_blossom.png">
    <link rel="stylesheet" href="css/digital-7.ttf">
        
<style>
* {
    margin: 0;
    box-sizing: border-box;
  }

body {
    margin: 0;
    background: url("media/Wii-Background.png");
    cursor: url("css/Wii Cursor.cur"), default;
}

a {
    text-decoration: none;
    color: #222;
}

form {
    text-align: center;
    font-family: "Digital-7";
    font-size: 20px;
    padding: 20px;
    cursor: url("css/Wii Cursor.cur"), default;

}

button {
    font-family: "Digital-7";
    margin-top: 18px;
    margin-bottom: 18px;
    font-size: 20px;
}

main ul.navigation {
    display: flex;
    width: 90%;
    max-width: 1300px;
    margin: auto;
    flex-wrap: wrap;
    list-style-type: none;
}

main ul.navigation li {
    position: relative;
    overflow: hidden;
    width: calc(25% - 0.8rem);
    margin: 0.4rem;
    aspect-ratio: 2 / 1;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    border: 2.4px solid #ccc;
    border-radius: 1rem;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.02);
}

main ul.navigation li.active {
    border-color: #a8d8ff;
    box-shadow: 0 0 10px 4px rgba(69, 159, 229, 0.75);
    transition: box-shadow 0.2s ease, border-color 0.2s ease;
}

.navigation li a {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    cursor: url("css/Wii Cursor.cur"), default;
}

.content {
    position: absolute;
    width: 100vw;
    display: flex;
    height: 100vh;
    top: 0;
    left: 0;
    z-index: 2;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    visibility: hidden;
}

.content:target {
    visibility: visible;
    pointer-events: auto;
    opacity: 1;
}

li img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

p {
    text-align: center;
    font-size: 28px;
    font-family: 'Digital-7', monospace;
    color: #7b7b7b;
    margin: 1.8rem auto;
}

.time {
    text-align: center;
    padding-bottom: 20px;
    font-size: 50px;
    font-family: 'Digital-7', monospace;
    color: #adabab;
    letter-spacing: 3px;
}

.button {
    background: #dddddd;
}

footer {
    position: fixed;
    align-items: center;
    bottom: 0px;
    display: flex;
    width: 100%;
    height: 200px;
}

.button-cont {
    position: absolute;
    width: 200px;
    left: -20px;
    z-index: 1;
    margin-left: -50px;
    padding: 1rem;
    padding-left: 200px;
    background: rgba(255, 255, 255, 0.2);
    border-radius: 6rem;
    display: flex;
    border: 2.4px solid #ccc;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.02);
    align-items: center;
}
        
.button-cont.right-side {
    left: auto;
    right: -40px;
    padding-left: 1rem;
    padding-right: 200px;
}

.button-cont.right-side .button {
    margin-left: .1rem;
}
        
.button-cont .button {
    min-width: 70px;
    text-align: center;
    display: flex;
    justify-content: center;
    transform: scale(1.2);
    align-items: center;
    border-radius: 100%;
    height: 70px;
    border-width: 4px;
    margin-left: -70px;
    border: 2.4px solid #ccc;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.02);
}

.help {
    display: none; 
    margin-left: 18%;
    width: 60%;
    background: rgb(236, 234, 234);
    text-align: center;
    border-radius: 1.2rem;
    box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.2);
    padding: 1.5rem;
}

.help-close {
    padding-top: 20px;
    color: #5f9ce7;
    font-weight: bold;
}

</style>
</head>

<body>
    <form>
        <label for="birthday">Birthday: </label>
        <input
        type="date"
        name="birthday"
        required
     />
     <br>
    <button type="submit">Find my Channel!</button>

    <main>
    </main>

    <div class="clock-container">
        <div class="time" id="time"></div>
    </div>

    <script src="test.js"></script>

    <script>
        function updateTime() {
            const now = new Date();

            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            const timeString = `${hours}:${minutes} ${ampm}`;
            
            document.getElementById('time').textContent = timeString;
        }
        
        updateTime();
        setInterval(updateTime, 60000);
    </script>

    <footer>
        <div class="button-cont">
            <a class="button">Home</a>
        </div>

        <div id="light" class="help">
            Need help? Put in your birthday and click 'Find my Channel' to find out what you're channeling!
            Or play around and click any of the channels by thumbnail!
            <br>
            <a class="help-close" id="close-btn" href="#">Close</a>
        </div>


        <div class="button-cont right-side">
            <a class="button" id="ask-btn" href="#">Ask</a>
        </div>
    </footer>

    </body>
</html>
