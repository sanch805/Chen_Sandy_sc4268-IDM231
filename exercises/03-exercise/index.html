<!DOCTYPE html>
<html lang="en">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">

<head>
    <title>Which Wii</title>
    <link rel="icon" type="image/png" href="media/mii.png">
    <link rel="stylesheet" href="css/digital-7.ttf">
        
<style>
* {
    margin: 0;
    box-sizing: border-box;
  }

body {
    margin: 0;
    background: url("media/Wii-Background.png");
    font-family: sans-serif;
    cursor: url("css/Wii Cursor.cur"), default;
}

a {
    text-decoration: none;
    color: #222;
}

main ul.navigation {
    display: flex;
    width: 90%;
    max-width: 1200px;
    margin: 10vh auto;
    padding: 1rem;
    flex-wrap: wrap;
    list-style-type: none;
}

main ul.navigation li {
    position: relative;
    overflow: hidden;
    width: calc(25% - 0.8rem);
    margin: 0.4rem;
    aspect-ratio: 2 / 1;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    border: 2.4px solid #ccc;
    border-radius: 1rem;
    box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.02);
}

.navigation li a {
    position: relative;
    z-index: 1;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
    cursor: url("css/Wii Cursor.cur"), default;
}

.content {
    position: absolute;
    width: 100vw;
    display: flex;
    height: 100vh;
    top: 0;
    left: 0;
    z-index: 2;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.4);
    opacity: 0;
    visibility: hidden;
}

.content .container {
    width: 500px;
    background: white;
    text-align: center;
    border-radius: 1rem;
    box-shadow: 4px 4px 20px rgba(0, 0, 0, 0.2);
    padding: 1rem;
}

.content:target {
    visibility: visible;
    pointer-events: auto;
    opacity: 1;
}

.back {
    border-radius: 1.4rem;
    box-shadow: 0 0 4px 1px rgba(0, 0, 0, 0.08), 0 0 0 4px white, 2px 2px 10px rgba(0, 0, 0, 0.2), 0 0 4px 2px rgba(0, 0, 0, 0.4);
    display: inline-block;
    padding: 0.4rem 1rem;
    text-align: center;
    color: black;
    width: 80%;
    background: linear-gradient(to bottom, rgb(243, 243, 243) 70%, rgba(0, 0, 0, 0.2));
    cursor: url("css/Wii Cursor.cur"), default;
}

li img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center;
}

.clock-container {
    text-align: center;
    padding-bottom: 30px;
}

.time {
    font-size: 62px;
    font-family: 'Digital-7', monospace;
    color: #adabab;
    letter-spacing: 3px;
}

.form {
    font-family: 'Digital-7', monospace;
    font-size: 17px;
}

input[type="date"] {
    padding: 8px 15px;
    font-family: 'Digital-7', monospace;
    font-size: 17px;
    border-radius: 1rem;
    border-color: #adabab;
    cursor: url("css/Wii Cursor.cur"), default;
}
</style>
</head>

<body>
    <form 
    method="POST">
        <label for="username">username</label>
        <input
        type="text"
        name="username"
        placeholder="John Doe"
        required
    /><br>
        <label for="birthday">birthday</label>
        <input
        type="date"
        name="birthday"
        required
     />
     <br>
        <button type="submit">Find my Channel!</button>
    </form>

    <main>
    </main>

    <div class="clock-container">
        <div class="time" id="time"></div>
    </div>

    <script src="scripts/test.js"></script>

    <script>
        function updateTime() {
            const now = new Date();

            let hours = now.getHours();
            const minutes = String(now.getMinutes()).padStart(2, '0');
            
            const ampm = hours >= 12 ? 'PM' : 'AM';
            hours = hours % 12;
            hours = hours ? hours : 12;
            
            const timeString = `${hours}:${minutes} ${ampm}`;
            
            document.getElementById('time').textContent = timeString;
        }
        
        updateTime();
        setInterval(updateTime, 60000);
    </script>
    
    </body>
</html>
